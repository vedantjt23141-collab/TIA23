<!DOCTYPE html>
<html>
<head>
    <title>My Mobile Website</title>

    <!-- jQuery & jQuery Mobile CDN -->
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<!-- Home Page -->
<div data-role="page" id="home">

    <div data-role="header">
        <h1>My Mobile Site</h1>
    </div>

    <div role="main" class="ui-content">
        <h2>Welcome!</h2>
        <p>This is a simple mobile website using jQuery Mobile.</p>

        <a href="#about" class="ui-btn ui-corner-all ui-shadow">About</a>
        <a href="#contact" class="ui-btn ui-corner-all ui-shadow">Contact</a>
    </div>

    <div data-role="footer">
        <h4>© 2026 My Site</h4>
    </div>

</div>

<!-- About Page -->
<div data-role="page" id="about">

    <div data-role="header">
        <h1>About</h1>
        <a href="#home" data-icon="back">Back</a>
    </div>

    <div role="main" class="ui-content">
        <p>This is the about page of your mobile website.</p>
    </div>

    <div data-role="footer">
        <h4>About Footer</h4>
    </div>

</div>

<!-- Contact Page -->
<div data-role="page" id="contact">

    <div data-role="header">
        <h1>Contact</h1>
        <a href="#home" data-icon="back">Back</a>
    </div>

    <div role="main" class="ui-content">
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name">

            <label for="email">Email:</label>
            <input type="email" id="email">

            <label for="message">Message:</label>
            <textarea id="message"></textarea>

            <button type="submit" class="ui-btn ui-btn-b">Send</button>
        </form>
    </div>

    <div data-role="footer">
        <h4>Contact Footer</h4>
    </div>

</div>

</body>
</html>
